name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate example
        run: rageval validate examples/gold.jsonl examples/run_a.jsonl --strict
      - name: Evaluate example
        run: rageval evaluate examples/gold.jsonl examples/run_a.jsonl --output /tmp/evaluation.json
      - name: Compare example
        run: rageval compare /tmp/evaluation.per_query.jsonl /tmp/evaluation.per_query.jsonl --metrics answer_claim_f1,recall@1
      - name: Calibrate example judge
        run: rageval calibrate examples/judge_labels.jsonl
